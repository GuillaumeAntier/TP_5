<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="admin-container">
    <!-- Navbar -->
    <nav class="admin-navbar">
      <div class="navbar-left">
        <h1>Admin Panel</h1>
      </div>
      <div class="navbar-right">
        <span id="admin-name" class="admin-name"></span>
        <button id="logout-btn" class="btn btn-logout">Déconnexion</button>
      </div>
    </nav>

    <!-- Contenu principal -->
    <div class="admin-content">
      <h2>Bienvenue administrateur</h2>
      <p>Vous êtes connecté au panneau d'administration.</p>
      
      <!-- Vous pouvez ajouter d'autres sections ici -->
      <div class="admin-section">
        <h3>Gestion des fichiers CSV</h3>
        <p>Section de gestion des fichiers importés.</p>
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
</body>
</html>
