<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSV Viewer</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/table.css">
</head>
<body>
  <div class="container">
    <h1>Importateur CSV</h1>
    
    <!-- Zone de téléchargement -->
    <div id="uploadZone" class="upload-zone">
      <p>Glissez-déposez un fichier CSV ici ou cliquez pour sélectionner</p>
      <input type="file" id="fileInput" accept=".csv" hidden>
    </div>
    
    <div id="fileName" hidden></div>
    <button id="uploadBtn" hidden>Importer</button>
    <div id="message" hidden></div>
    
    <!-- Section table complète avec pagination -->
    <div id="table-container" class="table-wrapper" hidden>
      <h2>Données complètes</h2>
      
      <div id="kpi-bar" class="kpi-bar" hidden>
        <div class="kpi-card kpi-total" role="status" aria-live="polite">
          <div class="kpi-title">Total clients</div>
          <div id="kpi-total-count" class="kpi-value">0</div>
        </div>

        <div class="kpi-card kpi-alert" role="status" aria-live="polite">
          <div class="kpi-title">
            Clients à risque
            <button
              type="button"
              class="kpi-tooltip"
              aria-label="Critère : un client est à risque si la colonne risque_churn vaut Élevé"
              title="Critère : un client est à risque si la colonne risque_churn vaut Élevé (insensible à la casse)."
            >
              ?
            </button>
          </div>
          <div id="kpi-risk-count" class="kpi-value">0</div>
        </div>
      </div>

      <div class="metadata">
        <span id="row-count">Lignes: 0</span>
        <span id="column-count">Colonnes: 0</span>
      </div>

      <table id="data-table" class="data-table">
        <thead id="table-head"></thead>
        <tbody id="table-body"></tbody>
      </table>

      <div class="pagination">
        <button id="prev-btn" class="btn" disabled>← Précédent</button>
        <span id="page-info">Page 1</span>
        <button id="next-btn" class="btn" disabled>Suivant →</button>
      </div>
    </div>
  </div>

  <!-- À ajouter dans index.html -->
  <a href="admin-login.html" class="admin-link">Admin</a>

  <script src="js/table.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
